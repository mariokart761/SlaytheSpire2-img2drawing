<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>img2drawing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- 標題列 -->
    <header class="titlebar">
      <span class="title-text">img2drawing</span>
      <span id="status-badge" class="badge badge--idle">待機</span>
    </header>

    <div class="layout">

      <!-- 左側：預覽區 + 前景提取 -->
      <section class="preview-panel">

        <div class="preview-box" id="preview-box">
          <span class="preview-placeholder" id="preview-placeholder">尚未載入圖片</span>
          <img id="preview-img" class="preview-img hidden" alt="預覽" />
          <canvas id="fg-canvas" class="fg-canvas hidden"></canvas>
        </div>

        <div class="preview-info">
          <span id="contour-count">輪廓數：—</span>
        </div>

        <button class="btn btn--primary btn--wide" id="btn-open">選擇圖片</button>
        <div class="path-display" id="img-path">—</div>

        <div class="fg-bar">
          <label class="toggle-label" title="啟用後可在預覽圖上拖曳框選前景區域">
            <input type="checkbox" id="fg-enable" />
            <span>前景框選</span>
          </label>
          <button class="btn btn--sm btn--danger" id="btn-fg-clear" disabled>清除</button>
        </div>
        <div id="fg-hint" class="hint hidden">在預覽圖上拖曳框選前景區域</div>
        <div id="fg-status" class="hint fg-processing hidden">⏳ 前景提取中...</div>

      </section>

      <!-- 右側：參數面板 -->
      <section class="params-panel">

        <!-- ── 邊緣偵測 ─────────────────────── -->
        <fieldset>
          <legend>邊緣偵測（Canny）</legend>
          <div class="row">
            <label>低閾值 <span id="val-thresh-low">50</span></label>
            <input type="range" id="thresh-low" min="1" max="255" value="50" />
          </div>
          <div class="row">
            <label>高閾值 <span id="val-thresh-high">150</span></label>
            <input type="range" id="thresh-high" min="1" max="255" value="150" />
          </div>
        </fieldset>

        <!-- ── 前處理平滑 ───────────────────── -->
        <fieldset>
          <legend>前處理平滑</legend>

          <div class="row checkbox-row">
            <label title="CLAHE 局部對比增強：讓眼睛、鼻子、嘴巴的邊緣更容易被偵測到">
              <input type="checkbox" id="use-clahe" checked />
              CLAHE 局部對比增強
            </label>
          </div>
          <div id="clahe-params" class="sub-params">
            <div class="row">
              <label>強度 <span id="val-clahe-clip">2.0</span></label>
              <input type="range" id="clahe-clip" min="5" max="80" value="20" />
            </div>
          </div>

          <div class="row checkbox-row">
            <label title="保留大邊界的同時去除細碎紋理，對動漫圖效果極佳">
              <input type="checkbox" id="use-bilateral" checked />
              Bilateral 平滑（保邊去紋理）
            </label>
          </div>
          <div id="bilateral-params" class="sub-params">
            <div class="row">
              <label>強度 <span id="val-bilateral-sigma">75</span></label>
              <input type="range" id="bilateral-sigma" min="10" max="200" value="75" />
            </div>
          </div>

          <div class="row checkbox-row">
            <label title="去除小雜點，核大小越大效果越強但會模糊邊緣">
              <input type="checkbox" id="use-median" />
              Median 去雜點
            </label>
          </div>
          <div id="median-params" class="sub-params hidden">
            <div class="row">
              <label>核大小 <span id="val-median-ksize">5</span></label>
              <input type="range" id="median-ksize" min="3" max="15" step="2" value="5" />
            </div>
          </div>
        </fieldset>

        <!-- ── 形態學後處理與細線化 ────────── -->
        <fieldset>
          <legend>形態學後處理與細線化</legend>

          <div class="row checkbox-row">
            <label title="把邊緣圖中的斷線接起來，讓輪廓更連續">
              <input type="checkbox" id="use-morph-close" checked />
              閉運算（連接斷線）
            </label>
          </div>
          <div id="morph-close-params" class="sub-params">
            <div class="row">
              <label>核大小 <span id="val-morph-close-ksize">3</span></label>
              <input type="range" id="morph-close-ksize" min="1" max="11" step="2" value="3" />
            </div>
          </div>

          <div class="row checkbox-row">
            <label title="去除邊緣圖中的細小孤立噪點">
              <input type="checkbox" id="use-morph-open" />
              開運算（去除噪點）
            </label>
          </div>
          <div id="morph-open-params" class="sub-params hidden">
            <div class="row">
              <label>核大小 <span id="val-morph-open-ksize">3</span></label>
              <input type="range" id="morph-open-ksize" min="1" max="11" step="2" value="3" />
            </div>
          </div>

          <div class="row checkbox-row">
            <label title="把粗邊緣壓縮成單像素中心線，根本解決「沿同一條線來回走」問題。需要 opencv-contrib-python">
              <input type="checkbox" id="use-thinning" checked />
              Thinning 細線化（解決來回走）
            </label>
          </div>
        </fieldset>

        <!-- ── 分區域過濾（人像用）──────────── -->
        <fieldset>
          <legend>分區域過濾（人像）</legend>
          <div class="row checkbox-row">
            <label title="上半部保留五官細節；下半部強力抑制衣物紋理、格紋陰影">
              <input type="checkbox" id="use-region-filter" />
              啟用分區過濾
            </label>
          </div>
          <div id="region-filter-params" class="sub-params hidden">
            <div class="row">
              <label>分割線 <span id="val-region-split">58</span>%</label>
              <input type="range" id="region-split" min="20" max="80" value="58" />
            </div>
            <div class="row">
              <label>下半 Bilateral <span id="val-region-sigma">120</span></label>
              <input type="range" id="region-sigma" min="30" max="250" value="120" />
            </div>
            <div class="row">
              <label>下半低閾值 <span id="val-region-thresh-low">80</span></label>
              <input type="range" id="region-thresh-low" min="1" max="255" value="80" />
            </div>
            <div class="row">
              <label>下半高閾值 <span id="val-region-thresh-high">180</span></label>
              <input type="range" id="region-thresh-high" min="1" max="255" value="180" />
            </div>
          </div>
        </fieldset>

        <!-- ── 輪廓過濾與簡化 ──────────────── -->
        <fieldset>
          <legend>輪廓過濾與簡化</legend>

          <div class="row">
            <label>最短輪廓 <span id="val-min-len">10</span> pt</label>
            <input type="range" id="min-len" min="1" max="200" value="10" />
          </div>
          <div class="row">
            <label>最小面積 <span id="val-min-area">0</span> px²</label>
            <input type="range" id="min-area" min="0" max="1000" value="0" />
          </div>

          <div class="row checkbox-row">
            <label title="Douglas-Peucker 路徑簡化：減少點數、減少鋸齒，值越大越簡化">
              <input type="checkbox" id="use-approx" checked />
              D-P 路徑簡化
            </label>
          </div>
          <div id="approx-params" class="sub-params">
            <div class="row">
              <label>簡化強度 <span id="val-approx-eps">2</span>‰</label>
              <input type="range" id="approx-eps" min="1" max="50" value="2" />
            </div>
          </div>
        </fieldset>

        <!-- ── 繪圖區域 ─────────────────────── -->
        <fieldset>
          <legend>繪圖區域避開（%）</legend>
          <div class="grid2">
            <div class="row"><label>左 <span id="val-avoid-left">0</span>%</label><input type="range" id="avoid-left" min="0" max="49" value="0" /></div>
            <div class="row"><label>右 <span id="val-avoid-right">0</span>%</label><input type="range" id="avoid-right" min="0" max="49" value="0" /></div>
            <div class="row"><label>上 <span id="val-avoid-top">0</span>%</label><input type="range" id="avoid-top" min="0" max="49" value="0" /></div>
            <div class="row"><label>下 <span id="val-avoid-bottom">0</span>%</label><input type="range" id="avoid-bottom" min="0" max="49" value="0" /></div>
          </div>
        </fieldset>

        <!-- ── 繪製起點 ─────────────────────── -->
        <fieldset>
          <legend>繪製起點</legend>
          <div class="row checkbox-row">
            <label title="啟用後以指定座標為圖片繪製中心，覆蓋避開邊距的自動居中">
              <input type="checkbox" id="use-anchor" />
              手動指定起點（覆蓋自動居中）
            </label>
          </div>
          <div id="anchor-section" class="anchor-section hidden">
            <div class="row">
              <label>X 座標</label>
              <input type="number" id="anchor-x" value="960" min="0" class="num-input" />
            </div>
            <div class="row">
              <label>Y 座標</label>
              <input type="number" id="anchor-y" value="540" min="0" class="num-input" />
            </div>
            <div class="row anchor-pick-row">
              <button class="btn btn--secondary" id="btn-pick-pos">
                移至目標位置後點此（3 s 後截取）
              </button>
              <span id="pick-countdown" class="pick-countdown"></span>
            </div>
          </div>
        </fieldset>

        <!-- ── 繪圖參數 ─────────────────────── -->
        <fieldset>
          <legend>繪圖參數</legend>
          <div class="row">
            <label>拖拽步長 <span id="val-drag-step">5</span> px</label>
            <input type="range" id="drag-step" min="1" max="50" value="5" />
          </div>
          <div class="row">
            <label>起落筆延遲 <span id="val-draw-delay">0.05</span> s</label>
            <input type="range" id="draw-delay" min="2" max="100" value="5" />
          </div>
          <div class="row">
            <label>繪圖按鍵</label>
            <select id="draw-button">
              <option value="right" selected>右鍵</option>
              <option value="left">左鍵</option>
            </select>
          </div>
          <div class="row checkbox-row">
            <label>
              <input type="checkbox" id="auto-align" checked />
              暫停恢復時自動對齊
            </label>
          </div>
        </fieldset>

        <!-- ── 熱鍵設定 ─────────────────────── -->
        <fieldset>
          <legend>熱鍵</legend>
          <div class="grid3">
            <div class="row"><label>開始</label><input type="text" id="key-start" value="f8" class="key-input" /></div>
            <div class="row"><label>暫停/繼續</label><input type="text" id="key-pause" value="f9" class="key-input" /></div>
            <div class="row"><label>停止</label><input type="text" id="key-stop" value="f10" class="key-input" /></div>
          </div>
          <button class="btn btn--secondary" id="btn-apply-keys">套用熱鍵</button>
        </fieldset>

      </section>
    </div>

    <!-- 底部控制列 -->
    <footer class="controlbar">
      <button class="btn btn--success" id="btn-start">▶ 開始 (F8)</button>
      <button class="btn btn--warning" id="btn-pause" disabled>⏸ 暫停 (F9)</button>
      <button class="btn btn--danger" id="btn-stop" disabled>■ 停止 (F10)</button>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <span id="status-text">準備就緒</span>
    </footer>

  </div>
  <script src="app.js"></script>
</body>
</html>
